name = "youtube-pipeline-mcp"
main = "src/index.js"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "PipelineMCP" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PipelineMCP"]
